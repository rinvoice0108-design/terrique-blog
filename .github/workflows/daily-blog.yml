name: 테리크 블로그 일일 자동화

on:
  workflow_dispatch:  # 수동 실행만 활성화 (스케줄 중지)

jobs:
  # ── Job 1: 평일·공휴일 게이트 ────────────────────────────────────
  schedule-check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 평일·공휴일 체크
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "수동 실행 — 공휴일 체크 건너뜀"
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif node scripts/check-holiday.js; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  # ── Job 2: 블로그 생성 + 메일 발송 ──────────────────────────────
  generate-blog:
    needs: schedule-check
    if: needs.schedule-check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Restore knowledge files
        env:
          BRAND_FACTS_MD: ${{ secrets.BRAND_FACTS_MD }}
          BANNED_WORDS_JSON: ${{ secrets.BANNED_WORDS_JSON }}
          TONE_SAMPLES: ${{ secrets.TONE_SAMPLES }}
          WRITING_PLAYBOOK: ${{ secrets.WRITING_PLAYBOOK }}
          CONVERSION_BENCHMARKS: ${{ secrets.CONVERSION_BENCHMARKS }}
        run: |
          mkdir -p knowledge/tone-samples knowledge/patterns output
          if [ -n "$BRAND_FACTS_MD" ]; then printf '%s' "$BRAND_FACTS_MD" > knowledge/brand-facts.md; fi
          if [ -n "$BANNED_WORDS_JSON" ]; then printf '%s' "$BANNED_WORDS_JSON" > knowledge/banned-words.json; fi
          if [ -n "$TONE_SAMPLES" ]; then printf '%s' "$TONE_SAMPLES" > knowledge/tone-samples/real-blog-posts.txt; fi
          if [ -n "$WRITING_PLAYBOOK" ]; then printf '%s' "$WRITING_PLAYBOOK" > knowledge/patterns/writing-playbook.txt; fi
          if [ -n "$CONVERSION_BENCHMARKS" ]; then printf '%s' "$CONVERSION_BENCHMARKS" > knowledge/conversion-benchmarks.md; fi

      - name: Create .env
        run: |
          echo "NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}" >> .env
          echo "NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GEMINI_IMAGE_MODEL=gemini-3.1-flash-image" >> .env
          echo "BRAND_NAME=terrique" >> .env
          echo "BRAND_BG_COLOR=#FFFFFF" >> .env
          echo "BRAND_FG_COLOR=#1A1A1A" >> .env
          echo "BRAND_ACCENT=#A08878" >> .env
          echo "GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}" >> .env
          echo "SHEETS_ID=${{ secrets.SHEETS_ID }}" >> .env

      - name: Check output folder before
        run: ls -la output/ || echo "output 폴더 없음"

      - name: Run daily blog generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CI: 'true'
        run: node scripts/daily-runner.js

      - name: Check output folder after
        if: always()
        run: find output/ -type f | head -30 || echo "output 파일 없음"
